<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Glasses - Quản lý bàn QR</title>
    <link rel="stylesheet" href="/vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/vendor/phosphor/regular/style.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <style>
        .table-admin-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: 360px minmax(0, 1fr);
        }

        .qr-url {
            background: var(--bg-muted);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            display: block;
            font-size: 12px;
            max-width: 340px;
            overflow: hidden;
            padding: 8px 10px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 1100px) {
            .table-admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="pos-container">
    <aside data-menu-component data-active-menu="tables"></aside>

    <main class="pos-main">
        <header class="pos-topbar">
            <h1 class="pos-topbar-title">Quản lý bàn QR</h1>
            <div class="pos-topbar-actions">
                <button class="btn btn-secondary" onclick="loadTables()">
                    <i class="ph ph-arrow-clockwise"></i> Làm mới
                </button>
            </div>
        </header>

        <section class="pos-content">
            <div class="table-admin-grid">
                <form class="pos-card" onsubmit="createTable(event)">
                    <h2 class="pos-card-title"><i class="ph ph-plus-circle"></i> Thêm bàn</h2>
                    <div class="mb-3">
                        <label class="form-label" for="tableCode">Mã bàn</label>
                        <input class="form-control" id="tableCode" placeholder="T04" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="tableName">Tên hiển thị</label>
                        <input class="form-control" id="tableName" placeholder="Bàn tư vấn 04" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">
                        <i class="ph ph-check"></i> Tạo bàn QR
                    </button>
                </form>

                <div class="pos-card">
                    <h2 class="pos-card-title"><i class="ph ph-list"></i> Danh sách bàn</h2>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>Mã</th>
                                    <th>Tên bàn</th>
                                    <th>QR URL</th>
                                    <th>Trạng thái</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="tablesBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    const user = requireRole("admin");

    if (user) {
        document.getElementById("welcomeUser").textContent = user.username;
        loadTables();
    }

    function qrUrl(token) {
        return `${window.location.origin}/qr/table.html?token=${encodeURIComponent(token)}`;
    }

    async function loadTables() {
        const body = document.getElementById("tablesBody");
        body.innerHTML = `<tr><td colspan="5">Đang tải danh sách bàn...</td></tr>`;

        try {
            const tables = await apiRequest("/api/admin/tables");
            if (!tables.length) {
                body.innerHTML = `<tr><td colspan="5">Chưa có bàn QR nào.</td></tr>`;
                return;
            }

            body.innerHTML = tables.map((table) => {
                const url = qrUrl(table.qr_token);
                const active = Number(table.is_active) === 1;
                return `
                    <tr>
                        <td><strong>${escapeHtml(table.code)}</strong></td>
                        <td>${escapeHtml(table.name)}</td>
                        <td><span class="qr-url" title="${escapeHtml(url)}">${escapeHtml(url)}</span></td>
                        <td>
                            <span class="badge ${active ? "bg-success" : "bg-danger"}">
                                ${active ? "Đang bật" : "Tạm ngưng"}
                            </span>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-secondary btn-sm" onclick="copyQr('${escapeHtml(url)}')">
                                <i class="ph ph-copy"></i>
                            </button>
                            <button class="btn ${active ? "btn-danger" : "btn-success"} btn-sm" onclick="toggleTable(${table.id}, ${active ? "false" : "true"})">
                                <i class="ph ${active ? "ph-pause" : "ph-play"}"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join("");
        } catch (error) {
            body.innerHTML = `<tr><td colspan="5">${escapeHtml(error.message)}</td></tr>`;
        }
    }

    async function createTable(event) {
        event.preventDefault();
        const code = document.getElementById("tableCode").value.trim();
        const name = document.getElementById("tableName").value.trim();

        try {
            await apiRequest("/api/admin/tables", {
                method: "POST",
                body: { code, name }
            });
            event.target.reset();
            showToast("Đã tạo bàn QR", "success");
            loadTables();
        } catch (error) {
            showToast(error.message, "error");
        }
    }

    async function toggleTable(id, isActive) {
        try {
            await apiRequest(`/api/admin/tables/${id}/status`, {
                method: "PATCH",
                body: { is_active: isActive }
            });
            showToast("Đã cập nhật trạng thái bàn", "success");
            loadTables();
        } catch (error) {
            showToast(error.message, "error");
        }
    }

    async function copyQr(url) {
        try {
            await navigator.clipboard.writeText(url);
            showToast("Đã sao chép QR URL", "success");
        } catch (error) {
            showToast("Không thể sao chép tự động", "warning");
        }
    }
</script>
</body>
</html>
