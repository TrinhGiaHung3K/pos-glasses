<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt kính tại bàn</title>
    <link rel="stylesheet" href="/vendor/phosphor/regular/style.css">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/qr.css">
</head>
<body class="qr-page">
    <main class="qr-shell">
        <header class="qr-header">
            <div>
                <img
                    class="qr-brand-logo"
                    src="../assets/images/pos-glasses-optic-bridge-logo.png"
                    alt="POS GLASSES"
                >
                <h1 class="qr-title">Chọn kính tại bàn</h1>
                <p class="qr-subtitle" id="tableSubtitle">Đang tải thông tin bàn...</p>
            </div>
            <div class="qr-table-pill" id="tableCode"><i class="ph ph-qr-code"></i> QR</div>
        </header>

        <section id="stateContainer" class="qr-state">
            <i class="ph ph-spinner"></i>
            <h2>Đang tải menu</h2>
            <p>Vui lòng chờ trong giây lát.</p>
        </section>

        <section id="menuContainer" hidden>
            <div class="qr-section-title">
                <span>Sản phẩm còn hàng</span>
                <span id="productCount">0</span>
            </div>
            <div class="qr-product-list" id="productList"></div>
        </section>
    </main>

    <div class="qr-cart-bar" id="cartBar" hidden>
        <div class="qr-cart-inner">
            <div>
                <div class="qr-cart-label" id="cartCount">Chưa chọn sản phẩm</div>
                <div class="qr-cart-total" id="cartTotal">0 đ</div>
            </div>
            <button class="qr-submit" id="submitBtn" onclick="submitOrder()" disabled>
                <i class="ph ph-paper-plane-tilt"></i>
                Gửi yêu cầu
            </button>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/format.js"></script>
    <script src="../assets/js/ui.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token") || "";
        const state = {
            table: null,
            products: [],
            cart: new Map(),
            submitting: false
        };

        function productImage(src) {
            if (!src) return "../images/wayfarer.jpg";
            if (src.startsWith("http") || src.startsWith("/")) return src;
            return `../${src}`;
        }

        function showState(type, icon, title, message) {
            const stateContainer = document.getElementById("stateContainer");
            stateContainer.className = `qr-state ${type || ""}`;
            stateContainer.hidden = false;
            stateContainer.innerHTML = `
                <i class="ph ${icon}"></i>
                <h2>${escapeHtml(title)}</h2>
                <p>${escapeHtml(message)}</p>
            `;
            document.getElementById("menuContainer").hidden = true;
            document.getElementById("cartBar").hidden = true;
        }

        function renderMenu() {
            document.getElementById("stateContainer").hidden = true;
            document.getElementById("menuContainer").hidden = false;
            document.getElementById("cartBar").hidden = false;
            document.getElementById("productCount").textContent = `${state.products.length} mẫu`;

            document.getElementById("productList").innerHTML = state.products.map((product) => {
                const qty = state.cart.get(product.id) || 0;
                return `
                    <article class="qr-product-card">
                        <img class="qr-product-image" src="${productImage(product.image)}" alt="${escapeHtml(product.name)}">
                        <div>
                            <h2 class="qr-product-name">${escapeHtml(product.name)}</h2>
                            <div class="qr-product-meta">Còn ${Number(product.quantity || 0)} sản phẩm</div>
                            <div class="qr-product-footer">
                                <div class="qr-price">${formatCurrency(product.price)}</div>
                                <div class="qr-stepper">
                                    <button type="button" onclick="changeQty(${product.id}, -1)" ${qty === 0 ? "disabled" : ""} aria-label="Giảm số lượng">
                                        <i class="ph ph-minus"></i>
                                    </button>
                                    <span>${qty}</span>
                                    <button type="button" onclick="changeQty(${product.id}, 1)" ${qty >= Number(product.quantity) ? "disabled" : ""} aria-label="Tăng số lượng">
                                        <i class="ph ph-plus"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join("");

            renderCart();
        }

        function renderCart() {
            let totalQty = 0;
            let total = 0;

            for (const product of state.products) {
                const qty = state.cart.get(product.id) || 0;
                totalQty += qty;
                total += qty * Number(product.price || 0);
            }

            document.getElementById("cartCount").textContent =
                totalQty > 0 ? `${totalQty} sản phẩm đã chọn` : "Chưa chọn sản phẩm";
            document.getElementById("cartTotal").textContent = formatCurrency(total);
            document.getElementById("submitBtn").disabled = totalQty === 0 || state.submitting;
        }

        function changeQty(productId, delta) {
            const product = state.products.find((item) => item.id === productId);
            if (!product) return;

            const currentQty = state.cart.get(productId) || 0;
            const nextQty = Math.max(0, Math.min(Number(product.quantity), currentQty + delta));

            if (nextQty === 0) {
                state.cart.delete(productId);
            } else {
                state.cart.set(productId, nextQty);
            }

            renderMenu();
        }

        async function submitOrder() {
            if (state.submitting || state.cart.size === 0) return;
            state.submitting = true;
            renderCart();

            try {
                const items = [...state.cart.entries()].map(([product_id, quantity]) => ({
                    product_id,
                    quantity
                }));

                await publicApiRequest("/api/public/table-orders", {
                    method: "POST",
                    body: { token, items }
                });

                showState(
                    "success",
                    "ph-check-circle",
                    "Đã gửi yêu cầu",
                    "Nhân viên sẽ kiểm tra và xác nhận đơn tại bàn của bạn."
                );
            } catch (error) {
                state.submitting = false;
                renderCart();
                showState("error", "ph-warning-circle", "Chưa gửi được yêu cầu", error.message);
            }
        }

        async function loadMenu() {
            if (!token) {
                showState("error", "ph-warning-circle", "QR không hợp lệ", "Thiếu mã bàn trong đường dẫn.");
                return;
            }

            try {
                const data = await publicApiRequest(`/api/public/tables/${encodeURIComponent(token)}/menu`);
                state.table = data.table;
                state.products = data.products || [];
                document.getElementById("tableSubtitle").textContent = data.table.name;
                document.getElementById("tableCode").innerHTML = `<i class="ph ph-map-pin"></i> ${escapeHtml(data.table.code)}`;

                if (state.products.length === 0) {
                    showState("error", "ph-package", "Chưa có sản phẩm", "Hiện chưa có sản phẩm còn hàng để đặt.");
                    return;
                }

                renderMenu();
            } catch (error) {
                showState("error", "ph-warning-circle", "Không mở được menu", error.message);
            }
        }

        loadMenu();
    </script>
</body>
</html>
